<ion-header>
  <ion-toolbar color="primary">
    <ion-title>FlexLog</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cerrarSesion()">
        <ion-icon name="log-out-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding" color="light">
  <div class="greeting-section">
    <h2>Hola, {{ nombreUsuario }}</h2>
    <p>Seleccioná tu gimnasio para empezar</p>
  </div>

  <ion-loading [isOpen]="cargando" message="Cargando..."></ion-loading>

  <ion-list lines="none" class="gym-list">
    <ion-item
      *ngFor="let gimnasio of gimnasios"
      [class.selected]="gimnasio.id === gimnasioSeleccionadoId"
      (click)="seleccionarGimnasio(gimnasio.id)"
      class="gym-item"
      detail>
      <ion-icon name="business-outline" slot="start" color="primary"></ion-icon>
      <ion-label>
        <h3>{{ gimnasio.nombre }}</h3>
        <p>{{ gimnasio.sucursal }}</p>
      </ion-label>
      <ion-icon
        *ngIf="gimnasio.id === gimnasioSeleccionadoId"
        name="checkmark-circle"
        slot="end"
        color="primary">
      </ion-icon>
    </ion-item>
  </ion-list>

  <div class="action-buttons">
    <ion-button
      expand="block"
      size="large"
      [disabled]="!gimnasioSeleccionadoId"
      (click)="comenzarEntrenamiento()"
      class="quick-action-btn">
      <ion-icon slot="start" name="barbell"></ion-icon>
      Iniciar Entrenamiento
    </ion-button>

    <ion-button
      expand="block"
      size="large"
      fill="outline"
      (click)="verHistorial()"
      class="quick-action-btn">
      <ion-icon slot="start" name="calendar-outline"></ion-icon>
      Ver Historial
    </ion-button>
  </div>
</ion-content>

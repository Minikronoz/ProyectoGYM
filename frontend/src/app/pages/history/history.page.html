<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-button (click)="irAtras()">
        <ion-icon name="arrow-back"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Historial</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding" color="light">
  <ion-loading [isOpen]="cargando" message="Cargando historial..."></ion-loading>

  <div class="history-list" *ngIf="!cargando">
    <div
      *ngFor="let sesion of sesiones"
      class="session-card workout-card"
      (click)="verSesion(sesion.id)">
      <div class="session-header">
        <ion-icon name="barbell-outline" color="primary"></ion-icon>
        <div class="session-info">
          <h3>{{ formatearFecha(sesion.fecha) }}</h3>
          <p>{{ sesion.notas_generales || 'Sin notas' }}</p>
        </div>
        <ion-icon name="chevron-forward-outline" color="medium"></ion-icon>
      </div>
    </div>

    <div class="empty-state" *ngIf="sesiones.length === 0">
      <ion-icon name="calendar-outline" color="medium"></ion-icon>
      <h3>Sin entrenamientos</h3>
      <p>Todavía no registraste ninguna sesión</p>
    </div>
  </div>
</ion-content>
